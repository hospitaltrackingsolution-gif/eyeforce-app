<style>
  :root {
    --canvas: #F7F6F2;
    --surface: #FFFFFF;
    --navy: #15233B;
    --navy-light: #1F3354;
    --teal: #1F9E8E;
    --gold: #C8A24A;
    --ink: #1A1F2B;
    --muted: #6E7480;
    --border: #E8E6E0;
    --danger: #C0564A;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(21, 35, 59, 0.06);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, .display {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }

  /* ---------- LOGIN ---------- */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--navy) 0%, #0E1827 100%);
    padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    text-align: center;
  }
  .login-card h1 { font-size: 22px; color: var(--navy); margin-bottom: 4px; }
  .login-card p.sub { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
  .login-hospital { font-size: 12.5px; color: var(--gold); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 22px; min-height: 16px; }
  .login-card input {
    width: 100%; padding: 12px 14px; margin-bottom: 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit;
  }
  .login-card input:focus { outline: none; border-color: var(--teal); }
  .login-card button {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: var(--navy); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .login-card button:hover { background: var(--navy-light); }
  .login-card button.loading::after { border-color: rgba(255,255,255,0.4); border-top-color: #fff; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* ---------- APP SHELL ---------- */
  .app { display: none; min-height: 100vh; }
  .app.active { display: flex; }

  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--navy);
    color: #C9D2E3;
    display: flex; flex-direction: column;
    padding: 22px 0;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 0 20px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 14px;
  }
  .sidebar-brand .mark {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    overflow: hidden; border: 1.5px solid rgba(255,255,255,0.15);
  }
  .sidebar-brand .mark img {
    width: 100%; height: 100%; object-fit: contain; border-radius: 50%;
  }
  .sidebar-brand .name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; color: #fff; line-height: 1.2; }
  .sidebar-brand .sub { font-size: 10px; color: #8C9BB5; letter-spacing: 0.08em; text-transform: uppercase; }

  #navItems { flex: 1 1 auto; overflow-y: auto; }

  .sidebar-footer {
    padding: 14px 20px 4px;
    margin-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 10.5px; line-height: 1.6;
    color: #8C9BB5; text-align: center;
  }
  .sidebar-footer b { color: #C9D2E3; }
  .sidebar-footer span { display: block; margin-top: 2px; font-size: 9.5px; opacity: 0.85; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 20px; font-size: 13.5px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, color 0.15s;
    color: #AEB9CE;
  }
  .nav-item .ico { width: 18px; text-align: center; font-size: 15px; }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
  .nav-item.active {
    background: rgba(255,255,255,0.06);
    border-left-color: var(--gold);
    color: #fff; font-weight: 600;
  }
  .nav-section-label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #5E6E8C; padding: 16px 20px 6px;
  }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .hospital-name { font-family: 'Fraunces', serif; font-size: 18px; color: var(--navy); }

  .today-badge {
    background: linear-gradient(135deg, #FBEFD6, #F4E0B2);
    border: 1px solid var(--gold);
    color: #7A5D1E;
    font-weight: 700; font-size: 13px; letter-spacing: 0.02em;
    padding: 7px 16px; border-radius: 999px;
    display: flex; align-items: center; gap: 8px;
  }
  .today-badge::before {
    content: '●'; color: var(--gold); font-size: 10px;
  }
  .today-badge.mismatch {
    background: linear-gradient(135deg, #FBE4E1, #F6CFC9);
    border-color: var(--danger); color: #8A332B; cursor: help;
  }
  .today-badge.mismatch::before { content: '⚠'; font-size: 12px; }
  .topbar .hospital-name .tag { font-size: 11px; color: var(--muted); font-family: 'Plus Jakarta Sans'; display: block; margin-top: 2px; }
  .topbar .user-info { text-align: right; font-size: 13px; }
  .topbar .user-info .uname { font-weight: 600; color: var(--ink); }
  .topbar .user-info .urole { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .topbar .logout { margin-left: 16px; color: var(--muted); cursor: pointer; font-size: 12px; text-decoration: underline; }
  .refresh-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: var(--navy); cursor: pointer;
    transition: transform 0.4s ease, background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .refresh-btn:hover { background: var(--canvas); color: var(--teal); }
  .refresh-btn.spinning { animation: spin360 0.6s linear; }
  @keyframes spin360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .content { flex: 1; padding: 24px 28px; overflow-y: auto; }

  .view { display: none; }
  .view.active { display: block; animation: fadein 0.25s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .page-title { font-size: 22px; color: var(--navy); margin-bottom: 4px; }
  .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  /* ---------- CARDS / GRID ---------- */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 20px;
  }
  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2,1fr); } }

  /* ---------- IRIS RING KPI ---------- */
  .kpi-card { display: flex; align-items: center; gap: 16px; }
  .iris-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .iris-ring svg { transform: rotate(-90deg); }
  .iris-ring .bg { stroke: var(--border); fill: none; stroke-width: 6; }
  .iris-ring .fg { stroke: var(--teal); fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .iris-ring .center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--navy); }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .kpi-value { font-family: 'Fraunces', serif; font-size: 26px; color: var(--navy); }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ---------- FORMS ---------- */
  .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px 18px; }
  @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr; } }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }

  .checkbox-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px 14px; border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    background: var(--canvas);
  }
  .checkbox-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text); cursor: pointer; }
  .checkbox-item input { width: 15px; height: 15px; accent-color: var(--teal); cursor: pointer; }
  .setting-help { font-size: 11.5px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--canvas);
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--teal); background: #fff; }
  .field.full { grid-column: 1 / -1; }
  .form-actions { margin-top: 18px; display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 11px 22px; border-radius: 8px; border: none; font-weight: 600;
    font-size: 13.5px; cursor: pointer; font-family: inherit; transition: opacity 0.15s;
    position: relative; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn.loading { opacity: 0.7; cursor: not-allowed; pointer-events: none; }
  .btn.loading::after {
    content: '';
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff; border-radius: 50%;
    animation: spin360 0.7s linear infinite; flex-shrink: 0;
  }
  .btn-secondary.loading::after { border-color: rgba(21,35,59,0.2); border-top-color: var(--navy); }
  .btn-primary { background: var(--teal); color: #fff; }
  .btn-secondary { background: var(--canvas); color: var(--ink); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-msg { font-size: 13px; margin-top: 10px; }
  .form-msg.success {
    color: var(--teal); background: rgba(31,158,142,0.10);
    border: 1px solid rgba(31,158,142,0.25); border-radius: var(--radius);
    padding: 10px 14px; font-weight: 600;
  }
  .form-msg.error {
    color: var(--danger); background: rgba(192,86,74,0.08);
    border: 1px solid rgba(192,86,74,0.25); border-radius: var(--radius);
    padding: 10px 14px; font-weight: 600;
  }

  /* ---------- MODAL ---------- */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(21,35,59,0.45); backdrop-filter: blur(2px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(21,35,59,0.25);
    width: 480px; max-width: 92vw; max-height: 86vh; overflow-y: auto;
    padding: 22px 24px;
  }
  .modal-title {
    font-family: 'Fraunces', Georgia, serif; font-size: 18px; font-weight: 700;
    color: var(--navy); margin-bottom: 4px;
  }
  .modal-sub { font-size: 12.5px; color: var(--muted); margin-bottom: 16px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .modal-field-readonly {
    background: var(--canvas); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 11px; font-size: 13px; color: var(--muted);
  }

  /* ---------- TABLES ---------- */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 2px solid var(--border); }
  td { padding: 10px 10px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill.teal { background: rgba(31,158,142,0.12); color: var(--teal); }
  .pill.gold { background: rgba(200,162,74,0.15); color: #9C7A2E; }
  .pill.gray { background: var(--border); color: var(--muted); }
  .pill.danger { background: rgba(192,86,74,0.12); color: var(--danger); }

  .flag-banner {
    background: rgba(200,162,74,0.1); border: 1px solid var(--gold);
    border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #6B5419; margin-bottom: 16px;
  }
  .flag-banner b { color: #4A3A12; }

  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 13px; }

  .range-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .range-tab {
    padding: 7px 16px; border-radius: 20px; font-size: 12.5px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--muted);
  }
  .range-tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  .section-title { font-size: 15px; color: var(--navy); margin-bottom: 12px; font-weight: 700; }
  .form-section-title {
    font-family: 'Fraunces', Georgia, serif; font-size: 14px; font-weight: 700; color: var(--teal);
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 18px 0 4px 0;
  }

  .search-box input { width: 100%; max-width: 480px; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
  .search-result { padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
  .search-result .src { color: var(--teal); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }

  /* ===================== COLORFUL CATEGORY KPI CARDS ===================== */
  .grid-5 { grid-template-columns: repeat(5, 1fr); }
  .grid-6 { grid-template-columns: repeat(6, 1fr); }
  .grid-8 { grid-template-columns: repeat(8, 1fr); }
  @media (max-width: 1400px) { .grid-8 { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 1300px) { .grid-5, .grid-6 { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 900px)  { .grid-8 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px)  { .grid-5, .grid-6, .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); } }

  .cat-card {
    border-radius: var(--radius); padding: 14px 16px; color: #fff; position: relative; overflow: hidden;
    box-shadow: var(--shadow); min-height: 84px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .cat-card .cat-label { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.92; }
  .cat-card .cat-value { font-family: 'Fraunces', Georgia, serif; font-size: 28px; font-weight: 700; line-height: 1.1; margin-top: 6px; }
  .cat-card .cat-sub { font-size: 10.5px; opacity: 0.85; margin-top: 2px; }
  .cat-card::after {
    content: ''; position: absolute; right: -18px; bottom: -18px; width: 70px; height: 70px;
    border-radius: 50%; background: rgba(255,255,255,0.12);
  }

  /* Distinct color palette cycled across category cards */
  .cat-c0 { background: linear-gradient(135deg, #1F9E8E, #15786B); }
  .cat-c1 { background: linear-gradient(135deg, #C8A24A, #A8813A); }
  .cat-c2 { background: linear-gradient(135deg, #5B7FDB, #3C5BB5); }
  .cat-c3 { background: linear-gradient(135deg, #C0564A, #9C3F35); }
  .cat-c4 { background: linear-gradient(135deg, #8A6FD1, #6A50B2); }
  .cat-c5 { background: linear-gradient(135deg, #3FA8D6, #2C7FA8); }
  .cat-c6 { background: linear-gradient(135deg, #E08E45, #C16E2A); }
  .cat-c7 { background: linear-gradient(135deg, #4FAE6B, #348C4E); }
  .cat-c8 { background: linear-gradient(135deg, #D2588C, #AB3D6B); }
  .cat-c9 { background: linear-gradient(135deg, #15233B, #1F3354); }

  /* Plain stat cards (white) for OPD breakup / revenue breakup */
  .stat-card {
    background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 16px; border-left: 4px solid var(--teal);
  }
  .stat-card .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .stat-value { font-family: 'Fraunces', Georgia, serif; font-size: 24px; font-weight: 700; color: var(--navy); margin-top: 4px; }
  .stat-card.gold { border-left-color: var(--gold); }
  .stat-card.danger { border-left-color: var(--danger); }
  .stat-card.navy { border-left-color: var(--navy); }
  .stat-card.teal { border-left-color: var(--teal); }
  .full { grid-column: 1 / -1; }

  /* Loading dots animation */
  .loading-dots { display: inline-flex; gap: 6px; }
  .loading-dots span {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--teal); opacity: 0.3;
    animation: blink 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

  .ops-gist {
    font-size: 13.5px; line-height: 1.7; color: var(--text);
    background: linear-gradient(135deg, rgba(31,158,142,0.06), rgba(200,162,74,0.06));
    border-left: 4px solid var(--teal);
  }

  .revenue-headline-card {
    border-radius: var(--radius); padding: 22px 24px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .revenue-headline-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(21,35,59,0.12); }
  .revenue-headline-card.collected {
    background: linear-gradient(135deg, #1F9E8E, #178F80);
    color: #fff;
  }
  .revenue-headline-card.expected {
    background: linear-gradient(135deg, #C8A24A, #B08D3C);
    color: #fff;
  }
  .rhl-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.85; margin-bottom: 8px; }
  .rhl-value { font-family: 'Fraunces', Georgia, serif; font-size: 34px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .rhl-sub { font-size: 12px; opacity: 0.78; }
  .rhl-hint { font-size: 11px; opacity: 0.6; margin-top: 10px; }

  /* ===================== COMPARISON CARDS ===================== */
  .comp-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
  .comp-card .comp-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .comp-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .comp-row:last-child { border-bottom: none; }
  .comp-row .comp-metric { color: var(--muted); }
  .comp-row .comp-values { display: flex; gap: 10px; align-items: center; font-weight: 600; }
  .comp-delta { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 12px; min-width: 48px; text-align: center; }
  .comp-delta.up { background: rgba(31,158,142,0.12); color: var(--teal); }
  .comp-delta.down { background: rgba(192,86,74,0.12); color: var(--danger); }
  .comp-delta.flat { background: var(--border); color: var(--muted); }

  /* ===================== CHARTS / HEATMAP / FUNNEL ===================== */
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap.small { height: 200px; }

  .heatmap-grid { display: grid; gap: 4px; }
  .heatmap-cell {
    border-radius: 4px; min-height: 28px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff;
  }
  .heatmap-row-label { font-size: 11px; color: var(--muted); display: flex; align-items: center; padding-right: 6px; font-weight: 600; }
  .heatmap-col-label { font-size: 10px; color: var(--muted); text-align: center; font-weight: 700; text-transform: uppercase; }

  .funnel-step { margin: 0 auto 6px auto; text-align: center; color: #fff; border-radius: 6px; padding: 10px 12px; font-size: 12.5px; font-weight: 600; }
  .funnel-step .fv { font-family: 'Fraunces', Georgia, serif; font-size: 18px; font-weight: 700; }

  /* ===================== REPORT BUTTONS / AI ANALYSIS ===================== */
  .report-actions { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .btn-report {
