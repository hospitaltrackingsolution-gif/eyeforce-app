<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EyeForce Solutions</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EyeForce">
<meta name="theme-color" content="#15233B">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#15233B;font-family:Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:30px}
.logo{background:#fff;border-radius:20px;padding:16px;width:140px;height:140px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.logo img{width:100%;height:100%;object-fit:contain}
h1{font-size:26px;font-weight:700;color:#fff;margin-bottom:6px}
p{font-size:12px;color:#C8A24A;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:36px}
a.btn{display:inline-block;background:#1F9E8E;color:#fff;font-size:16px;font-weight:700;padding:16px 40px;border-radius:50px;text-decoration:none;margin-bottom:14px}
.note{font-size:12px;color:rgba(255,255,255,0.4)}
.hint{margin-top:20px;font-size:11px;color:rgba(255,255,255,0.35)}
</style>
</head>
<body>
<div class="logo"><img src="icon-512.png" alt="EyeForce"></div>
<h1>EyeForce Solutions</h1>
<p>Practice &amp; Business Intelligence</p>
<a class="btn" id="btn" href="https://script.google.com/macros/s/AKfycbyMgl1VCYpy5hARiyywhFeTmQ7LsoXDtE26UIFnQxummsHyBHovDsnwl4Tjl74QonU0/exec">Open EyeForce App</a>
<div class="note">Opening automatically in <span id="n">3</span>s</div>
<div class="hint" id="hint"></div>
<script>
var U="https://script.google.com/macros/s/AKfycbyMgl1VCYpy5hARiyywhFeTmQ7LsoXDtE26UIFnQxummsHyBHovDsnwl4Tjl74QonU0/exec";
var t=3;
var x=setInterval(function(){t--;document.getElementById("n").textContent=t;if(t<=0){clearInterval(x);location.href=U;}},1000);
document.getElementById("btn").onclick=function(){clearInterval(x);};
var ios=/iPad|iPhone|iPod/.test(navigator.userAgent);
document.getElementById("hint").textContent=ios?"📲 Tap Share → Add to Home Screen for app icon":"📲 Tap menu ⋮ → Add to Home Screen for app icon";
</script>
</body>
</html>
